<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Eternal Queen ❤️</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@500;700&family=Great+Vibes&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">

    <audio id="bgMusic" loop src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=romantic-piano-112199.mp3"></audio>

    <style>
        :root {
            --royal-gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.5);
            --royal-burgundy: #2a0812;
            --dark-bg: #07040a;
            --parchment: #f4e4bc;
            --parchment-text: #2c1a0e;
            --accent-pink: #ff2a7a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--dark-bg);
            color: #f0e6d2;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Ambient Glow Background */
        .ambient-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 30%, #1e0010 0%, #07040a 85%);
        }

        /* Fireworks Canvas Overlay */
        #fxCanvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
        }

        section {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .hidden {
            display: none !important;
            opacity: 0;
        }

        .card {
            width: 100%;
            max-width: 800px;
            padding: 48px 36px;
            border-radius: 20px;
            background: rgba(25, 10, 20, 0.75);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 0 35px rgba(0, 0, 0, 0.9), inset 0 0 15px rgba(212, 175, 55, 0.15);
            text-align: center;
            position: relative;
        }

        h1, h2 {
            font-family: 'Cinzel Decorative', serif;
            color: var(--royal-gold);
            text-shadow: 0 0 15px var(--gold-glow);
        }

        .btn-royal {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 40px;
            border-radius: 50px;
            border: 2px solid var(--royal-gold);
            background: linear-gradient(135deg, #4a0d1d 0%, #1a050b 100%);
            color: var(--royal-gold);
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            margin-top: 30px;
        }

        .btn-royal:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 0 35px var(--royal-gold);
            background: var(--royal-gold);
            color: var(--dark-bg);
        }

        /* ==========================================
           1. BROKEN HEART PUZZLE ASSEMBLY
        ========================================== */
        .puzzle-instructions {
            color: #d4c3b3;
            margin-bottom: 25px;
            font-style: italic;
        }

        .heart-puzzle-area {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .heart-outline {
            font-size: 110px;
            opacity: 0.25;
            filter: grayscale(100%);
            transition: all 0.8s ease;
        }

        .heart-piece {
            position: absolute;
            font-size: 50px;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 10px rgba(255, 42, 122, 0.8));
        }

        /* Piece Scatter Positions */
        #piece1 { top: 0; left: 10px; transform: rotate(-25deg); }
        #piece2 { top: 0; right: 10px; transform: rotate(30deg); }
        #piece3 { bottom: 10px; left: 20px; transform: rotate(-15deg); }
        #piece4 { bottom: 10px; right: 20px; transform: rotate(40deg); }

        .assembled {
            animation: pulseHeart 1.5s infinite alternate;
        }

        @keyframes pulseHeart {
            0% { transform: scale(1); filter: drop-shadow(0 0 20px #ff2a7a); }
            100% { transform: scale(1.15); filter: drop-shadow(0 0 45px #ff2a7a); }
        }

        /* ==========================================
           2. RELATIONSHIP COUNTER
        ========================================== */
        .timer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            margin: 35px 0;
        }

        .timer-box {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--royal-gold);
            border-radius: 12px;
            padding: 18px 10px;
            box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.2);
        }

        .timer-box h3 {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            color: #ffffff;
            text-shadow: 0 0 10px var(--royal-gold);
        }

        .timer-box span {
            font-size: 0.75rem;
            color: var(--royal-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ==========================================
           3. KING STYLE ROYAL PARCHMENT LETTER
        ========================================== */
        .royal-parchment {
            background: linear-gradient(135deg, #f4e4bc 0%, #e2ca90 100%);
            color: var(--parchment-text);
            padding: 40px;
            border-radius: 8px;
            border: 12px solid #5c1827;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.9), inset 0 0 50px rgba(0,0,0,0.3);
            text-align: left;
            position: relative;
            margin-top: 25px;
            font-family: 'Cinzel', serif;
            max-height: 420px;
            overflow-y: auto;
        }

        .royal-parchment::before {
            content: "👑";
            display: block;
            text-align: center;
            font-size: 35px;
            margin-bottom: 10px;
        }

        .royal-letter-body {
            font-size: 1.05rem;
            line-height: 2;
            white-space: pre-wrap;
            font-weight: 600;
        }

        .wax-seal {
            width: 70px;
            height: 70px;
            background: #8b0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--royal-gold);
            font-family: 'Great Vibes', cursive;
            font-size: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 0 10px rgba(0,0,0,0.5);
            margin: 20px auto 0 auto;
            border: 2px dashed var(--royal-gold);
        }

        /* ==========================================
           4. 100 REASONS PAGE (1 TO 100)
        ========================================== */
        .reasons-scroll-box {
            max-height: 420px;
            overflow-y: auto;
            text-align: left;
            padding: 25px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--royal-gold);
            border-radius: 12px;
            margin: 25px 0;
        }

        .reason-item {
            padding: 12px 15px;
            border-bottom: 1px
